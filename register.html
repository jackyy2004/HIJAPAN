<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Hi Japan!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
        }
        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, rgba(236, 174, 65, 0.9), rgba(216, 74, 73, 0.9)), url('https://images.unsplash.com/photo-1528164344705-47542687000d?q=80&w=2092&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 48px;
        }
        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            background: var(--color-bg);
            overflow-y: auto;
        }
        .auth-form-wrapper {
            max-width: 400px;
            width: 100%;
        }
        .form-control-custom {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(216, 74, 73, 0.1);
            outline: none;
        }
        @media (max-width: 768px) {
            .auth-left {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Banner Side -->
        <div class="auth-left">
            <div class="text-center fade-in-up">
                <a href="index.html" class="brand-logo text-white justify-content-center mb-5" style="font-size: 2.5rem;">
                    <div class="brand-icon bg-white text-primary">H</div>
                    Hi Japan!
                </a>
                <h1 class="display-4 fw-bold mb-4">Bắt đầu ngay hôm nay!</h1>
                <p class="lead">Tạo tài khoản miễn phí để khám phá phương pháp học tiếng Nhật hiệu quả nhất.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-right">
            <div class="auth-form-wrapper fade-in-up" style="animation-delay: 0.2s;">
                <h2 class="fw-bold mb-2">Đăng ký tài khoản</h2>
                <p class="text-muted mb-4">Đã có tài khoản? <a href="login.html" class="text-primary fw-600 text-decoration-none">Đăng nhập</a></p>

                <form action="dashboard.html">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-500">Họ và tên</label>
                        <input type="text" class="form-control form-control-custom w-100" placeholder="Nguyễn Văn A" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-500">Email</label>
                        <input type="email" class="form-control form-control-custom w-100" placeholder="abc@gmail.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-500 mb-0">Mật khẩu</label>
                        <input type="password" class="form-control form-control-custom w-100 mt-2" placeholder="Tạo mật khẩu (ít nhất 6 ký tự)" required minlength="6">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-500 mb-0">Nhập lại mật khẩu</label>
                        <input type="password" class="form-control form-control-custom w-100 mt-2" placeholder="Xác nhận mật khẩu" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary-warm w-100 py-3 mb-4" style="border-radius: var(--radius-md);">Tạo tài khoản</button>

                    <div class="position-relative mb-4 text-center">
                        <hr class="text-muted">
                        <span class="bg-bg position-absolute px-2 text-muted" style="top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--color-bg);">hoặc đăng ký bằng</span>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="button" class="btn btn-outline-warm flex-1 w-100 d-flex align-items-center justify-content-center gap-2" style="border-radius: var(--radius-md);">
                            <i class="bi bi-google"></i> Google
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
